<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <script>
    var l = window.location;
    var base = l.pathname.split('/').slice(0, 2).join('/');
    l.replace(
      l.origin + base + '/?p=' +
      encodeURIComponent(l.pathname.slice(base.length) + l.search) +
      (l.hash ? '&h=' + encodeURIComponent(l.hash) : '')
    );
  </script>
</head>
</html>
